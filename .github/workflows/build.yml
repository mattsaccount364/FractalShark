name: Build

on:
  push:
    branches: ["main"]
    tags:
      - "*"
  pull_request:
  schedule:
    - cron: "0 8 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write        # allows OIDC token minting for signing
  attestations: write    # allows uploading the attestation to GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---- PDF notes (reusable workflow, runs in parallel with code builds) ----
  build-pdf:
    name: Build PDF Notes
    uses: ./.github/workflows/build-pdf.yml
    permissions:
      contents: read

  # ---- Linux CMake builds (Debug tests + Release artifacts) ----
  build-linux:
    name: Build FractalShark (Linux CMake)
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:13.3.0-devel-ubuntu22.04

    defaults:
      run:
        shell: bash

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            gnupg \
            lsb-release \
            software-properties-common \
            wget

          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" \
            > /etc/apt/sources.list.d/kitware.list

          add-apt-repository -y ppa:ubuntu-toolchain-r/test
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          /tmp/llvm.sh 18

          apt-get update
          apt-get install -y --no-install-recommends \
            binutils \
            cmake \
            g++-13 \
            git \
            libgl-dev \
            libglx-dev \
            libglu1-mesa-dev \
            libgmp-dev \
            libstdc++-13-dev \
            libx11-dev \
            make

          cmake --version
          clang-18 --version
          clang++-18 --version
          g++-13 --version

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Verify CUDA toolkit
        run: |
          if [ -x /usr/local/cuda-13.3/bin/nvcc ]; then
            cuda_root=/usr/local/cuda-13.3
          elif [ -x /usr/local/cuda/bin/nvcc ]; then
            cuda_root=/usr/local/cuda
          else
            echo "nvcc not found in CUDA container" >&2
            exit 1
          fi

          echo "CUDA_PATH=$cuda_root" >> "$GITHUB_ENV"
          echo "CUDA_PATH_V13_3=$cuda_root" >> "$GITHUB_ENV"
          echo "CUDA_PATH_VX_Y=CUDA_PATH_V13_3" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$cuda_root/lib64:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "$cuda_root/bin" >> "$GITHUB_PATH"
          "$cuda_root/bin/nvcc" --version

      - name: Configure CMake (Debug)
        run: |
          cmake -B build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CUDA_HOST_COMPILER=g++-13 \
            -DCMAKE_CXX_FLAGS_DEBUG="-g3" \
            -DCMAKE_CUDA_FLAGS_DEBUG="-g -G"

      - name: Configure CMake (Release)
        run: |
          cmake -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CUDA_HOST_COMPILER=g++-13 \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3 -g3 -DNDEBUG" \
            -DCMAKE_CUDA_FLAGS_RELEASE="-O3 -g -lineinfo -DNDEBUG"

      - name: Verify Linux CMake configuration
        run: |
          grep -q '^CMAKE_BUILD_TYPE:STRING=Debug$' build-debug/CMakeCache.txt
          grep -q '^CMAKE_BUILD_TYPE:STRING=Release$' build-release/CMakeCache.txt
          grep -q '^CMAKE_CXX_FLAGS_DEBUG:STRING=-g3$' build-debug/CMakeCache.txt
          grep -q '^CMAKE_CUDA_FLAGS_DEBUG:STRING=-g -G$' build-debug/CMakeCache.txt
          grep -q '^CMAKE_CXX_FLAGS_RELEASE:STRING=-O3 -g3 -DNDEBUG$' build-release/CMakeCache.txt
          grep -q '^CMAKE_CUDA_FLAGS_RELEASE:STRING=-O3 -g -lineinfo -DNDEBUG$' build-release/CMakeCache.txt
          grep '^CMAKE_BUILD_TYPE:STRING=' build-debug/CMakeCache.txt
          grep '^CMAKE_BUILD_TYPE:STRING=' build-release/CMakeCache.txt
          grep '^CMAKE_CXX_FLAGS_DEBUG:STRING=' build-debug/CMakeCache.txt
          grep '^CMAKE_CUDA_FLAGS_DEBUG:STRING=' build-debug/CMakeCache.txt
          grep '^CMAKE_CXX_FLAGS_RELEASE:STRING=' build-release/CMakeCache.txt
          grep '^CMAKE_CUDA_FLAGS_RELEASE:STRING=' build-release/CMakeCache.txt

      - name: Build Debug
        # Serial build (-j 1) is intentional: parallel compilation of CUDA TUs
        # plus heavy C++23 template instantiations exceeds the hosted runner
        # memory and triggers the OOM killer.
        run: cmake --build build-debug -j 1

      - name: Build Release
        # Serial build (-j 1) is intentional: parallel compilation of CUDA TUs
        # plus heavy C++23 template instantiations exceeds the hosted runner
        # memory and triggers the OOM killer.
        run: cmake --build build-release -j 1

      - name: Verify Linux debug symbols
        run: |
          set -euo pipefail

          for binary in \
            build-debug/FractalSharkTest/FractalSharkTest \
            build-debug/FractalSharkCli/FractalSharkCli \
            build-debug/FractalSharkGuiLinux/FractalSharkGuiLinux \
            build-release/FractalSharkCli/FractalSharkCli \
            build-release/FractalSharkGuiLinux/FractalSharkGuiLinux
          do
            echo "== $binary =="
            file "$binary"
            readelf -S "$binary" | grep -q '\.debug_info'
            readelf -S "$binary" | grep -q '\.debug_line'
            readelf -S "$binary" | grep -q '\.symtab'
          done

      - name: Run FractalSharkTest
        run: ./build-debug/FractalSharkTest/FractalSharkTest

      - name: Smoke-test FractalSharkCli
        run: |
          ./build-release/FractalSharkCli/FractalSharkCli --builtin-view 0 --render-algorithm Cpu64 --out cli-smoke-test.png --quiet
          test -f cli-smoke-test.png || (echo "FractalSharkCli produced no output" && exit 1)
          rm cli-smoke-test.png

        # HpSharkFloatTest is built but not run on CI — it requires a physical
        # CUDA GPU, which GitHub-hosted runners don't provide. Runtime GPU
        # testing is deferred to a future self-hosted runner.

      - name: Audit Linux release dependencies
        run: |
          set -euo pipefail

          for binary in \
            build-release/FractalSharkCli/FractalSharkCli \
            build-release/FractalSharkGuiLinux/FractalSharkGuiLinux
          do
            echo "== $binary =="
            ldd "$binary"
            readelf -V "$binary" | grep -E 'GLIBC_|GLIBCXX_|CXXABI_' || true

            if readelf -V "$binary" | grep -Eq 'GLIBC_(2\.(3[6-9]|[4-9][0-9])|[3-9][0-9]\.)'; then
              echo "$binary requires glibc newer than the Ubuntu 22.04 baseline (GLIBC_2.35)" >&2
              exit 1
            fi
          done

      - name: Package Linux artifacts
        run: |
          mkdir -p dist-linux
          test -x build-release/FractalSharkCli/FractalSharkCli
          test -x build-release/FractalSharkGuiLinux/FractalSharkGuiLinux
          cp build-release/FractalSharkCli/FractalSharkCli dist-linux/
          cp build-release/FractalSharkGuiLinux/FractalSharkGuiLinux dist-linux/
          tar -czf FractalShark-Linux.tar.gz -C dist-linux FractalSharkCli FractalSharkGuiLinux
          tar -tzf FractalShark-Linux.tar.gz

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FractalShark-Linux
          path: FractalShark-Linux.tar.gz
          if-no-files-found: error

  # ---- Code build (Debug and Release run as parallel matrix legs) ----
  build:
    name: Build FractalShark (${{ matrix.configuration }})
    runs-on: windows-2025-vs2026

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Checkout MPIR
        uses: actions/checkout@v6
        with:
          repository: BrianGladman/mpir
          ref: dc82b0475dea84d5338356e49176c40be03a5bdf
          path: mpir

      - name: Install VC++ 2010 runtime (for vsyasm)
        shell: pwsh
        run: |
          choco install vcredist2010 -y

      - name: Initialize MSBuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsPath) { throw "Visual Studio with MSBuild not found" }
          $msbuildDir = Join-Path $vsPath "MSBuild\Current\Bin"
          if (-not (Test-Path (Join-Path $msbuildDir "MSBuild.exe"))) { throw "MSBuild.exe not found" }
          $msbuildDir | Out-File -FilePath $env:GITHUB_PATH -Append

      # Note 2025-12: Tried various current vsyasm but failed.  Just
      # keeping custom one for now.
      - name: Extract bundled tools to Program Files
        shell: pwsh
        run: |
          $zip = Join-Path $env:GITHUB_WORKSPACE "tools\yasm.zip"
          $dst = "C:\Program Files\vsyasm"

          Write-Host "ZIP path: $zip"
          if (-not (Test-Path $zip)) {
            throw "Zip not found at $zip. Check repo path/casing and that the file is committed."
          }

          $item = Get-Item $zip
          Write-Host ("Zip size: {0:n0} bytes" -f $item.Length)

          # Detect Git LFS pointer (typically tiny and starts with 'version https://git-lfs.github.com/spec/v1')
          $firstLine = (Get-Content -Path $zip -TotalCount 1 -ErrorAction SilentlyContinue)
          if ($item.Length -lt 2000 -and $firstLine -like "version https://git-lfs.github.com/spec/v1*") {
            throw "This file is a Git LFS pointer, not the real zip. Fix: set actions/checkout@v6 with `lfs: true`."
          }

          # Clean install location
          if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          # Unzip
          Expand-Archive -Path $zip -DestinationPath $dst -Force

          # Unblock extracted EXEs (Windows MOTW)
          Get-ChildItem -Path $dst -Recurse -File | Unblock-File

          # Find the actual bin dir (handles nested folders inside the zip)
          $exe = Get-ChildItem -Path $dst -Recurse -Filter "vsyasm.exe" -File | Select-Object -First 1
          if (-not $exe) { throw "vsyasm.exe not found anywhere under $dst after unzip." }

          $binDir = $exe.Directory.FullName
          Write-Host "Using bin dir: $binDir"
          Get-ChildItem $binDir | Format-Table -AutoSize

          # PATH + env vars for later steps
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Append
          "YASMInstallDir=$binDir\"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "YASMINSTALLDIR=$binDir\"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "YASM_PATH=$binDir\"       | Out-File -FilePath $env:GITHUB_ENV -Append
          "YASM_NAME=vsyasm.exe"     | Out-File -FilePath $env:GITHUB_ENV -Append

          try {
            & $exe.FullName /?
          } catch {
            # ignore
          }
          $LASTEXITCODE = 0

      # Originally it wouldn't load.  Used this to sort out it was missing the VC runtime dependency.
      - name: Dump DLL dependencies (vsyasm)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio with VC tools not found"
          }

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            throw "vcvars64.bat not found"
          }

          cmd /c "`"$vcvars`" >nul && dumpbin /dependents `"C:\Program Files\vsyasm\vsyasm.exe`""

      # See if the damn thing runs
      - name: Verify vsyasm/yasm are visible
        shell: pwsh
        run: |
          Write-Host "YASM_PATH: $env:YASM_PATH"
          Get-Command vsyasm.exe -ErrorAction Stop | Format-List
          Get-Command yasm.exe   -ErrorAction SilentlyContinue | Format-List

      - name: Try running vsyasm directly (diagnostic)
        shell: pwsh
        continue-on-error: true
        run: |
          & "C:\Program Files\vsyasm\vsyasm.exe" --version
          Write-Host "Exit code: $LASTEXITCODE"

      # ---- Cache MPIR build outputs ----
      - name: Cache MPIR build
        id: mpir-cache
        uses: actions/cache@v5
        with:
          path: mpir/lib/x64/${{ matrix.configuration }}
          key: mpir-${{ runner.os }}-skylake-avx-x64-${{ matrix.configuration }}-${{ hashFiles('mpir/**/*.c', 'mpir/**/*.h', 'mpir/**/*.asm') }}

      # ---- Build MPIR (official entrypoint) ----
      - name: Build MPIR (skylake_avx, ${{ matrix.configuration }} x64)
        if: steps.mpir-cache.outputs.cache-hit != 'true'
        working-directory: mpir\msvc\vs22
        shell: cmd
        run: msbuild.bat skylake_avx LIB x64 ${{ matrix.configuration }}

      # ---- CUDA ----
      - name: Install CUDA Toolkit
        shell: pwsh
        run: |
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.3"
          $cudaBin = Join-Path $cudaPath "bin"
          $nvcc = Join-Path $cudaBin "nvcc.exe"
          $installer = Join-Path $env:RUNNER_TEMP "cuda_13.3.0_windows_network.exe"

          Invoke-WebRequest `
            -Uri "https://developer.download.nvidia.com/compute/cuda/13.3.0/network_installers/cuda_13.3.0_windows_network.exe" `
            -OutFile $installer

          $signature = Get-AuthenticodeSignature $installer
          if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Subject -notlike "*NVIDIA*") {
            throw "CUDA installer signature is not valid and issued to NVIDIA: $($signature.Status) $($signature.SignerCertificate.Subject)"
          }

          $process = Start-Process -FilePath $installer -ArgumentList "-s" -Wait -PassThru -WindowStyle Hidden
          if ($process.ExitCode -notin 0, 3010) {
            throw "CUDA installer failed with exit code $($process.ExitCode)"
          }
          if (-not (Test-Path $nvcc)) {
            throw "nvcc.exe not found after CUDA installation: $nvcc"
          }

          "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CUDA_PATH_V13_3=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CUDA_PATH_VX_Y=CUDA_PATH_V13_3" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $cudaBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $nvcc --version

      # ---- Build FractalShark ----
      - name: Build ${{ matrix.configuration }}
        run: msbuild FractalShark\FractalShark.sln /m /v:m /p:Configuration=${{ matrix.configuration }} /p:Platform=x64

      - name: Run unit tests
        run: ${{ matrix.configuration }}\FractalSharkTest.exe

      - name: Smoke-test FractalSharkCli
        shell: pwsh
        run: |
          & "${{ matrix.configuration }}\FractalSharkCli.exe" --builtin-view 0 --render-algorithm Cpu64 --out cli-smoke-test.png --quiet
          if (-not (Test-Path cli-smoke-test.png)) { throw "FractalSharkCli produced no output" }
          Remove-Item cli-smoke-test.png

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FractalShark-${{ matrix.configuration }}
          path: |
            **/${{ matrix.configuration }}/**
            **/x64/${{ matrix.configuration }}/**

  release:
    name: Create FractalShark Release
    runs-on: windows-2025-vs2026
    needs: [build, build-linux, build-pdf]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: "Diagnostic: environment + context"
        shell: pwsh
        run: |
          Write-Host "=== GitHub Context ==="
          Write-Host "GITHUB_REF       = $env:GITHUB_REF"
          Write-Host "GITHUB_REF_NAME  = $env:GITHUB_REF_NAME"
          Write-Host "GITHUB_SHA       = $env:GITHUB_SHA"
          Write-Host "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
          Write-Host "Runner OS        = $env:RUNNER_OS"
          Write-Host "Runner Arch      = $env:RUNNER_ARCH"

          Write-Host "`n=== Directory listing (workspace root) ==="
          Get-ChildItem -Force | Format-Table -AutoSize

          Write-Host "`n=== PowerShell version ==="
          $PSVersionTable

      - name: Checkout repo (needed for gh/git context)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Diagnostic: git state"
        shell: pwsh
        run: |
          Write-Host "=== Git version ==="
          git --version

          Write-Host "`n=== Is this a git repo? ==="
          git rev-parse --is-inside-work-tree

          Write-Host "`n=== HEAD ==="
          git log -1 --oneline

          Write-Host "`n=== Tags ==="
          git tag --list

          Write-Host "`n=== Status ==="
          git status --porcelain=v1

      - name: Download Release build artifacts
        uses: actions/download-artifact@v8
        with:
          name: FractalShark-Release
          path: dist

      - name: Download FractalShark notes PDF artifact
        uses: actions/download-artifact@v8
        with:
          name: FractalSharkNotes
          path: _notes_art

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v8
        with:
          name: FractalShark-Linux
          path: _linux_art

      - name: Normalize FractalShark.pdf path
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path _notes_art -Recurse -Filter FractalShark.pdf -File | Select-Object -First 1
          if (-not $found) { throw "FractalShark.pdf not found under _notes_art" }
      
          New-Item -ItemType Directory -Force -Path Notes | Out-Null
          Copy-Item $found.FullName "Notes\FractalShark.pdf" -Force

      - name: "Diagnostic: artifact layout"
        shell: pwsh
        run: |
          Write-Host "=== dist tree ==="
          if (Test-Path dist) {
            Get-ChildItem dist -Recurse | Format-Table FullName, Length
          } else {
            Write-Error "dist directory does not exist"
          }

          Write-Host "`n=== _notes_art tree (notes kept separate) ==="
          if (Test-Path _notes_art) {
            Get-ChildItem _notes_art -Recurse | Format-Table FullName, Length
          }

      - name: Package artifacts (zip)
        shell: pwsh
        run: |
          # --- locate built binaries robustly (artifact layout may vary) ---
          $exe = Get-ChildItem dist -Recurse -Filter FractalShark.exe -File | Select-Object -First 1
          if (-not $exe) { throw "FractalShark.exe not found anywhere under dist" }

          $pdb = Get-ChildItem dist -Recurse -Filter FractalShark.pdb -File | Select-Object -First 1
          if (-not $pdb) { throw "FractalShark.pdb not found anywhere under dist" }

          $pdfSrc = Join-Path $PWD "Notes\FractalShark.pdf"
          if (-not (Test-Path $pdfSrc)) {
            throw "FractalShark.pdf missing at $pdfSrc (Normalize step failed?)"
          }

          Write-Host "Using EXE: $($exe.FullName)"
          Write-Host "Using PDB: $($pdb.FullName)"
          Write-Host "Using PDF: $pdfSrc"

          # --- stage outputs ---
          New-Item -ItemType Directory -Force -Path out | Out-Null

          Copy-Item $exe.FullName "out\FractalShark.exe" -Force
          Copy-Item $pdb.FullName "out\FractalShark.pdb" -Force
          Copy-Item $pdfSrc       "out\FractalShark.pdf"        -Force

          $zip = "out\FractalShark-$env:GITHUB_REF_NAME.zip"

          # --- create final release zip (exe + pdb + notes) ---
          Compress-Archive `
            -Path "out\FractalShark.exe","out\FractalShark.pdb","out\FractalShark.pdf" `
            -DestinationPath $zip `
            -Force

          Write-Host "`n=== out directory ==="
          Get-ChildItem out | Format-Table -AutoSize

          Write-Host "`n=== ZIP verification ==="
          if (-not (Test-Path $zip)) { throw "ZIP not created: $zip" }

          Expand-Archive -Path $zip -DestinationPath out\_verify -Force
          Get-ChildItem out\_verify | Format-Table -AutoSize

      - name: Normalize Linux artifact path
        shell: pwsh
        run: |
          $source = "_linux_art\FractalShark-Linux.tar.gz"
          if (-not (Test-Path $source)) { throw "Linux archive not found: $source" }

          $destination = "out\FractalShark-Linux-$env:GITHUB_REF_NAME.tar.gz"
          Copy-Item $source $destination -Force

      - name: Verify release archives exist (pre-attestation)
        shell: pwsh
        run: |
          $windowsZip = "out\FractalShark-$env:GITHUB_REF_NAME.zip"
          if (-not (Test-Path $windowsZip)) { throw "ZIP not found: $windowsZip" }

          $linuxArchive = "out\FractalShark-Linux-$env:GITHUB_REF_NAME.tar.gz"
          if (-not (Test-Path $linuxArchive)) { throw "Linux archive not found: $linuxArchive" }

      - name: Generate build provenance attestation (ZIP)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: out/FractalShark-${{ github.ref_name }}.zip

      - name: Generate build provenance attestation (Linux archive)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: out/FractalShark-Linux-${{ github.ref_name }}.tar.gz

      - name: "Diagnostic: gh auth + version"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "=== gh version ==="
          gh --version

          Write-Host "`n=== gh auth status ==="
          gh auth status

          Write-Host "`n=== gh release view (pre-flight) ==="
          gh release view "$env:GITHUB_REF_NAME"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Release does not exist yet (expected)"
            $global:LASTEXITCODE = 0
          }

      - name: Delete and recreate Release (always overwrite)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $zip = "out\FractalShark-$tag.zip"
          $linuxArchive = "out\FractalShark-Linux-$tag.tar.gz"

          if (-not (Test-Path $zip)) { throw "Missing asset: $zip" }
          if (-not (Test-Path $linuxArchive)) { throw "Missing asset: $linuxArchive" }

          $pdf = "out\FractalShark.pdf"
          if (-not (Test-Path $pdf)) { throw "Missing asset: $pdf" }

          $title = "FractalShark $tag"
          $notes = "Automated release for $tag"

          Write-Host "Tag:   $tag"
          Write-Host "Asset: $zip"
          Write-Host "Asset: $linuxArchive"
          Write-Host "Asset: $pdf"

          Write-Host "Deleting existing release if present..."
          gh release delete "$tag" --yes 2>$null
          $LASTEXITCODE = 0

          Write-Host "Creating release..."
          gh release create "$tag" `
            --verify-tag `
            --title "$title" `
            --notes "$notes" `
            "$zip" "$linuxArchive" "$pdf"
